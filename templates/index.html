<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaysFinder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-6">

    <div class="text-center mb-10">
        <h1 class="text-4xl font-extrabold text-blue-500 mb-2">
            <i class="fa-solid fa-shield-halved"></i> BAYOSPEL FINDER
        </h1>
        <p class="text-slate-400">Advanced OSINT & Background Intelligence Tool</p>
    </div>

    <div class="w-full max-w-md bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700">
        <form action="/lookup" method="post" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Input Phone Number</label>
                <input type="text" name="phone" placeholder="+234..." 
                    class="w-full px-4 py-3 bg-slate-900 border border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-white placeholder-slate-500">
            </div>
            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-300 shadow-lg">
                Run Intelligence Scan
            </button>
        </form>
    </div>

    {% if results %}
    <div class="w-full max-w-md mt-8 bg-slate-800 rounded-2xl border border-blue-500 overflow-hidden animate-fade-in">
        <div class="bg-blue-600 px-6 py-3 font-bold uppercase tracking-widest text-sm">
            Scan Report
        </div>
        <div class="p-6 space-y-4">
            <div class="flex justify-between border-b border-slate-700 pb-2">
                <span class="text-slate-400">Full Name</span>
                <span class="font-semibold text-green-400">{{ results.Name }}</span>
            </div>
            <div class="flex justify-between border-b border-slate-700 pb-2">
                <span class="text-slate-400">Carrier</span>
                <span class="font-semibold text-white">{{ results.Carrier }}</span>
            </div>
            <div class="flex justify-between border-b border-slate-700 pb-2">
                <span class="text-slate-400">Line Type</span>
                <span class="font-semibold text-white">{{ results.Type }}</span>
            </div>
            <div class="flex justify-between">
                <span class="text-slate-400">Database Status</span>
                <span class="text-xs bg-slate-700 px-2 py-1 rounded text-blue-300">Verified</span>
            </div>
        </div>
    </div>
    {% endif %}

    <footer class="mt-12 text-slate-500 text-sm">
        Built by Bayonle &copy; 2026 | Secure OSINT Portal
    </footer>

</body>
</html>
