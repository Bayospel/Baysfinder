<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAYOSPEL | OSINT Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a, #020617);
            background-attachment: fixed;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        .neon-border {
            border-bottom: 2px solid #3b82f6;
            box-shadow: 0px 4px 15px rgba(59, 130, 246, 0.5);
        }
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 5px rgba(59, 130, 246, 0.4); }
            50% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.7); }
            100% { box-shadow: 0 0 5px rgba(59, 130, 246, 0.4); }
        }
        .scan-btn:hover {
            animation: pulse-glow 1.5s infinite;
        }
        .grid-bg {
            background-image: radial-gradient(#1e293b 1px, transparent 1px);
            background-size: 30px 30px;
        }
    </style>
</head>
<body class="grid-bg text-slate-200 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="text-center mb-8 animate-pulse">
        <div class="inline-block p-3 rounded-full bg-blue-500/10 mb-4 border border-blue-500/30">
            <i class="fa-solid fa-user-secret text-4xl text-blue-400"></i>
        </div>
        <h1 class="text-5xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-500 uppercase">
            Bayospel Finder
        </h1>
        <p class="text-xs font-mono tracking-widest text-blue-300/60 mt-2">SYSTEM STATUS: READY // ENCRYPTED_LINK_ACTIVE</p>
    </div>

    <div class="w-full max-w-md glass-card rounded-3xl p-8 transition-all hover:border-blue-500/50">
        <form action="/lookup" method="post" class="space-y-6">
            <div class="relative">
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-3 ml-1">Terminal_Target_Input</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-blue-400">
                        <i class="fa-solid fa-phone"></i>
                    </span>
                    <input type="text" name="phone" placeholder="+234..." 
                        class="w-full pl-12 pr-4 py-4 bg-slate-900/50 border border-slate-700 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:outline-none focus:border-blue-500 text-white placeholder-slate-600 transition-all font-mono">
                </div>
            </div>
            
            <button type="submit" 
                class="scan-btn w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-black py-4 rounded-2xl transition-all shadow-xl flex items-center justify-center gap-2 uppercase tracking-tighter">
                <i class="fa-solid fa-bolt"></i> Initialize Intelligence Scan
            </button>
        </form>

        {% if results %}
        <div class="mt-8 pt-6 border-t border-slate-700/50 space-y-4">
            <div class="flex items-center justify-between p-4 bg-slate-900/40 rounded-xl border-l-4 border-blue-500">
                <div>
                    <p class="text-[10px] text-blue-400 uppercase font-bold tracking-widest">Identified_User</p>
                    <h2 class="text-xl font-bold text-white">{{ results.Name }}</h2>
                </div>
                <i class="fa-solid fa-circle-check text-green-500"></i>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="p-4 bg-slate-900/40 rounded-xl">
                    <p class="text-[10px] text-slate-500 uppercase font-bold">Network_Provider</p>
                    <p class="text-sm font-semibold text-slate-200">{{ results.Carrier }}</p>
                </div>
                <div class="p-4 bg-slate-900/40 rounded-xl">
                    <p class="text-[10px] text-slate-500 uppercase font-bold">Protocol_Type</p>
                    <p class="text-sm font-semibold text-slate-200">{{ results.Type }}</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3 mt-4">
                <a href="https://www.google.com/search?q=%22{{ results.Number }}%22" target="_blank" 
                   class="flex items-center justify-center gap-2 py-2 text-xs bg-slate-800 hover:bg-slate-700 rounded-lg text-slate-300 transition border border-slate-700">
                    <i class="fa-brands fa-google"></i> Google Repo
                </a>
                <a href="https://www.facebook.com/search/top/?q={{ results.Number }}" target="_blank" 
                   class="flex items-center justify-center gap-2 py-2 text-xs bg-blue-900/30 hover:bg-blue-900/50 rounded-lg text-blue-300 transition border border-blue-800/50">
                    <i class="fa-brands fa-facebook"></i> Social Map
                </a>
            </div>
        </div>
        {% endif %}
    </div>

    <footer class="mt-8 font-mono text-[10px] text-slate-600 uppercase tracking-widest">
        &copy; 2026 BAYONLE SEC OPS // VERCEL_STABLE_V1.0
    </footer>

</body>
</html>
